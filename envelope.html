```html
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>One Last Envelope | liv-os</title>

    <link rel="stylesheet" href="css/envelope.css">

</head>

<body>

    <!-- Background -->

    <div class="background"></div>

    <!-- Envelope Scene -->

    <main class="scene">

        <div id="envelope" class="envelope">

            <!-- Pink Letter -->

            <div id="paper" class="paper">

                <div class="paper-content">

                    <h1>Dear Ruben,</h1>

                </div>

            </div>

            <!-- Back -->

            <div class="envelope-back"></div>

            <!-- Front -->

            <div class="envelope-front"></div>

            <!-- Flap -->

            <div id="flap" class="flap"></div>

        </div>

    </main>

    <!-- Background Music -->

    <audio
        id="bgMusic"
        preload="auto">

        <source src="assets/audio/letter.mp3" type="audio/mpeg">

    </audio>

    <script src="js/envelope.js"></script>

</body>

</html>
