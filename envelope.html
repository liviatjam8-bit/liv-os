<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Envelope | liv-os</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600&family=Cormorant+Garamond:wght@500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/envelope.css">

</head>

<body>

<div class="scene">

    <div class="envelope-wrapper">

        <div class="envelope" id="envelope">

            <!-- back -->
            <div class="back"></div>

            <!-- left -->
            <div class="left-fold"></div>

            <!-- right -->
            <div class="right-fold"></div>

            <!-- bottom -->
            <div class="bottom-fold"></div>

            <!-- top flap -->
            <div class="flap"></div>

            <!-- Address -->
            <div class="address">

                <span class="to">To:</span>

                <span class="name">Ruben</span>

                <span class="love">♡</span>

                <span class="smile">=)</span>

            </div>

            <!-- Hint -->
            <div class="hint">
                Click to Open
            </div>

        </div>

    </div>

</div>

<audio id="paperSound" preload="auto">
    <source src="assets/audio/paper.mp3" type="audio/mpeg">
</audio>

<script src="js/envelope.js"></script>

</body>

</html>
